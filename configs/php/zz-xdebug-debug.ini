; Xdebug configuration for Cursor IDE (loads last to override image defaults).
[xdebug]
xdebug.mode = debug,develop
xdebug.start_with_request = trigger
xdebug.trigger_value = CURSOR
xdebug.idekey = CURSOR
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.discover_client_host = 1
xdebug.log = /tmp/xdebug.log
xdebug.log_level = 7
; Limit variable serialization - Drupal entities can cause memory overflow with deep inspection.
xdebug.max_children = 64
xdebug.max_data = 512
xdebug.max_depth = 3

; Disable OPcache when debugging - prevents Xdebug from dying at breakpoints.
opcache.enable = 0

; Prevent request timeout while paused at breakpoint (10 minutes).
max_execution_time = 600
